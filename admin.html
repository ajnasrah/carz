<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carz Inc - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .login-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #1e2a3a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #2a3a4a;
            border-radius: 8px;
            background: #0f1923;
            color: #fff;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            background: linear-gradient(135deg, #e94560, #d63850);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .error {
            color: #e94560;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        /* Dashboard Styles */
        .dashboard {
            display: none;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #1e2a3a;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #e94560;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-logout {
            background: #333;
            color: #fff;
        }

        .btn-refresh {
            background: #4ade80;
            color: #000;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e2a3a;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 2.5em;
            color: #4ade80;
            font-weight: bold;
        }

        .stat-card .number.warning {
            color: #facc15;
        }

        .users-table {
            background: #1e2a3a;
            border-radius: 10px;
            overflow: hidden;
        }

        .users-table h2 {
            padding: 20px;
            border-bottom: 1px solid #2a3a4a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #2a3a4a;
        }

        th {
            background: #0f1923;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        tr:hover {
            background: #253545;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0f1923;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .status-new {
            background: #1a3a5a;
            color: #60a5fa;
        }

        .status-progress {
            background: #3a3a1a;
            color: #facc15;
        }

        .status-complete {
            background: #1a3a1a;
            color: #4ade80;
        }

        .no-users {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
        }

        .back-link a:hover {
            color: #e94560;
        }

        @media (max-width: 768px) {
            th, td {
                padding: 10px;
                font-size: 0.85em;
            }

            .hide-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <form id="admin-login">
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="admin-password" required placeholder="Enter admin password">
                </div>
                <button type="submit" class="btn">Login</button>
                <p class="error" id="error-msg">Incorrect password</p>
            </form>
            <div class="back-link">
                <a href="login.html">&larr; Back to Training</a>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <div class="header-actions">
                <button class="btn-small btn-refresh" onclick="loadUsers()">Refresh</button>
                <button class="btn-small btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="number" id="total-users">0</div>
            </div>
            <div class="stat-card">
                <h3>In Progress</h3>
                <div class="number warning" id="in-progress">0</div>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <div class="number" id="completed">0</div>
            </div>
            <div class="stat-card">
                <h3>Avg Progress</h3>
                <div class="number" id="avg-progress">0%</div>
            </div>
        </div>

        <div class="users-table">
            <h2>All Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Progress</th>
                        <th>Current Module</th>
                        <th class="hide-mobile">Started</th>
                        <th class="hide-mobile">Last Active</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                </tbody>
            </table>
            <div class="no-users" id="no-users" style="display: none;">
                No users have started training yet.
            </div>
        </div>
    </div>

    <script>
        // CHANGE THIS PASSWORD
        const ADMIN_PASSWORD = 'carzadmin123';

        // Check if already logged in
        if (sessionStorage.getItem('carzAdminLoggedIn') === 'true') {
            showDashboard();
        }

        document.getElementById('admin-login').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('admin-password').value;

            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('carzAdminLoggedIn', 'true');
                showDashboard();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadUsers();
        }

        function logout() {
            sessionStorage.removeItem('carzAdminLoggedIn');
            location.reload();
        }

        function loadUsers() {
            const allUsers = JSON.parse(localStorage.getItem('carzAllUsers') || '{}');
            const tbody = document.getElementById('users-tbody');
            const noUsers = document.getElementById('no-users');

            const userArray = Object.values(allUsers);

            if (userArray.length === 0) {
                tbody.innerHTML = '';
                noUsers.style.display = 'block';
                return;
            }

            noUsers.style.display = 'none';

            // Sort by last active
            userArray.sort((a, b) => new Date(b.lastActive) - new Date(a.lastActive));

            // Calculate stats
            let totalProgress = 0;
            let completed = 0;
            let inProgress = 0;

            userArray.forEach(user => {
                totalProgress += user.progress || 0;
                if (user.progress >= 100) completed++;
                else if (user.progress > 0) inProgress++;
            });

            document.getElementById('total-users').textContent = userArray.length;
            document.getElementById('in-progress').textContent = inProgress;
            document.getElementById('completed').textContent = completed;
            document.getElementById('avg-progress').textContent = Math.round(totalProgress / userArray.length) + '%';

            // Build table
            tbody.innerHTML = userArray.map(user => {
                const progress = user.progress || 0;
                let statusClass, statusText;

                if (progress >= 100) {
                    statusClass = 'status-complete';
                    statusText = 'Completed';
                } else if (progress > 0) {
                    statusClass = 'status-progress';
                    statusText = 'In Progress';
                } else {
                    statusClass = 'status-new';
                    statusText = 'Just Started';
                }

                return `
                    <tr>
                        <td><strong>${user.name}</strong></td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <small style="color: #888;">${progress}%</small>
                        </td>
                        <td>${user.currentModule || 'Module 1'}</td>
                        <td class="hide-mobile">${formatDate(user.startedAt)}</td>
                        <td class="hide-mobile">${formatDate(user.lastActive)}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
